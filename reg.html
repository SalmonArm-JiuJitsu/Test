<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Square Test</title>

  <!-- Square SDK -->
  <script src="https://sandbox.web.squarecdn.com/v1/square.js"></script>

  <style>
    body {
      font-family: Arial;
      padding: 40px;
    }

    #card-container {
      margin: 20px 0;
      padding: 10px;
      border: 1px solid #ccc;
    }

    button {
      padding: 12px 20px;
      font-size: 16px;
      cursor: pointer;
    }

    #status {
      margin-top: 20px;
    }
  </style>
</head>

<body>

  <h2>Square Payment Test</h2>

  <div id="card-container"></div>

  <button id="pay-button">Pay $624.75</button>

  <div id="status"></div>

  <script>
    document.addEventListener("DOMContentLoaded", async function () {

      try {
        const payments = Square.payments(
          "sandbox-sq0idb-3StoAPgNhvyZ16M4u1EjVQ",
          "LS7KJCFPBPBG8"
        );

        const card = await payments.card();
        await card.attach("#card-container");

        const payButton = document.getElementById("pay-button");

        payButton.addEventListener("click", async () => {
          const result = await card.tokenize();

          document.getElementById("status").innerText =
            "Token created:\n" + JSON.stringify(result, null, 2);

          console.log(result);
        });

      } catch (err) {
        console.error(err);
        document.getElementById("status").innerText =
          "ERROR: " + err.message;
      }

    });
  </script>

</body>
</html>
